# ── SonarQube Cloud Project Identification ─────────────
sonar.projectKey=YOUR_PROJECT_KEY
sonar.organization=YOUR_ORGANIZATION_KEY
# ── Source Folders to Scan ─────────────────────────────
# lib/ = Flutter/Dart code
# app/ = PHP backend code (adjust to your folder name)
sonar.sources=lib,app
# ── Files/Folders to Exclude from Scanning ─────────────
sonar.exclusions=**/*.g.dart,**/vendor/**,**/node_modules/**
